[package]
name = "composite_committed_sort_segment"
type = "bin"
authors = []

# Sub-circuit for Variant committed-A (hierarchical TSP, Merkle commitment,
# partition HIDDEN behind a *blinded* Poseidon2 commitment, sort-based partition
# check in the glue).  Forked from composite_plain_sort_segment: the public sorted_nodes,
# start_node, end_node and partial_cost are GONE; in their place is a single
# hiding commitment C_i = fold(r, [cycle_segment..., partial_cost]).  The
# per-segment sort (plain A's G2) is dropped -- the glue does the global sort over
# the concatenated, now-witnessed segment nodes.  Public surface: {root, C_i}.

[dependencies]
poseidon = { tag = "v0.3.0", git = "https://github.com/noir-lang/poseidon" }
