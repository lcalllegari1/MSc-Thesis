[package]
name = "composite_plain_sort_glue"
type = "bin"
authors = []

# Glue circuit for Variant A (hierarchical TSP, Merkle commitment, partition public).
# Verifies K boundary edges via Poseidon2 Merkle proofs against the same root
# as the K sub-proofs, checks the global partition by sorting all K segments'
# sorted_nodes concatenations to [0..N-1], and enforces the threshold sum.

[dependencies]
poseidon = { tag = "v0.3.0", git = "https://github.com/noir-lang/poseidon" }
