[package]
name = "flat_full_invperm"
type = "bin"
authors = []

# No external dependencies.
# The cost matrix is passed directly as public input (no Merkle commitment).
# Permutation check uses an explicit inverse-permutation witness: N range checks
# + N dynamic ROM lookups = 2N constrained operations.  Compare to flat_full_sort
# (~3N) and flat_full_pairwise (O(N^2)).  The saving comes from eliminating the
# sortedness verification; the cost is one extra private array in Prover.toml.

