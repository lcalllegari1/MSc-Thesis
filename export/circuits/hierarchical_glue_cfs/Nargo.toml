[package]
name = "hierarchical_glue_cfs"
type = "bin"
authors = []

# Glue circuit for Variant committed-A++ (hierarchical TSP, Merkle commitment,
# partition HIDDEN behind blinded Poseidon2 commitments).  Forked from
# hierarchical_glue_fs: the per-segment public arrays (starts, ends,
# partial_costs, P_is, h_ins, h_outs) and c move to PRIVATE witness; the glue
# recomputes each commitment C_i = fold(r_i, [...]) over the witness and asserts
# it equals the public C_is[i] (which the verifier cross-checks equals sub_i.C_i).
# All A++ checks (chain stitch, in-circuit Fiat-Shamir, grand-product partition,
# boundary Merkle, threshold) run on the witnessed values.  Public surface:
# {root, threshold, X, C_is}.

[dependencies]
poseidon = { tag = "v0.3.0", git = "https://github.com/noir-lang/poseidon" }
