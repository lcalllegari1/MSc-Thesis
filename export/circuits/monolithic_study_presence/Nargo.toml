[package]
name = "monolithic_study_presence"
type = "bin"
authors = []

# No external dependencies.
# The cost matrix is passed directly as public input (no Merkle commitment).
# Permutation check uses a mutable boolean mark array: N range checks (GROUP 1)
# + N RAM reads + N RAM writes + N RAM init writes (GROUP 2) ≈ 4N constrained
# operations. Unlike monolithic_study_invperm (2N ROM), this requires a RAM table in
# UltraHonk (higher per-access overhead than ROM). Unlike monolithic_study_invperm,
# no extra private witness is needed -- the prover supplies only `cycle`.

