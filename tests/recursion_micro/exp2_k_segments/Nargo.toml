[package]
name = "rec_exp2_k_segments"
type = "bin"
authors = []

# Experiment 2 outer circuit: the "recursive A++" glue for arbitrary K (>= 2).
# Recursively verifies all K hierarchical_segment_fs proofs in-circuit AND folds
# in the full glue logic (chain stitch, Fiat-Shamir bind, grand-product
# partition, K boundary Merkle edges, threshold).  Exposes only (root, threshold)
# -- identical public surface to flat_merkle, i.e. perfect/information-theoretic
# hiding.  This is the equal-ground recursive counterpart of Variant A / A++ at
# the same K.  The K, N, DEPTH globals are patched per-config by the driver.
# See tests/recursion_micro/ and HOWTO.md.

[dependencies]
bb_proof_verification = { git = "https://github.com/AztecProtocol/aztec-packages", tag = "v5.0.0-nightly.20260518", directory = "barretenberg/noir/bb_proof_verification" }
poseidon = { tag = "v0.3.0", git = "https://github.com/noir-lang/poseidon" }
